    <script>
      (function() {
        try {
          var theme = localStorage.getItem('aqs_theme');
          var isDark = false;
          if (theme === 'dark') {
            isDark = true;
          } else if (theme === 'system' || !theme) {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!theme) {
              var legacyDark = localStorage.getItem('aqs_dark_mode');
              if (legacyDark === 'true') {
                isDark = true;
                localStorage.setItem('aqs_theme', 'dark');
                localStorage.removeItem('aqs_dark_mode');
              } else if (legacyDark === 'false') {
                localStorage.setItem('aqs_theme', 'light');
                localStorage.removeItem('aqs_dark_mode');
              }
            }
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
